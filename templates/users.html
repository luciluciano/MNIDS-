<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MNIDS - User Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #030712;
            --card-bg: rgba(17, 24, 39, 0.7);
            --text: #f8fafc;
            --sidebar-width: 260px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image:
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background: rgba(3, 7, 18, 0.95);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            height: 100vh;
            position: fixed;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            z-index: 100;
        }

        .sidebar-brand {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        .nav-menu {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            color: #94a3b8;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .nav-link:hover,
        .nav-link.active {
            background: rgba(99, 102, 241, 0.1);
            color: var(--text);
        }

        .nav-link.active {
            border-left: 3px solid var(--primary);
            background: linear-gradient(to right, rgba(99, 102, 241, 0.1), transparent);
        }

        /* Main Content */
        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 2.5rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 600;
        }

        .btn-add {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -8px rgba(99, 102, 241, 0.5);
        }

        /* Table Stylings */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: rgba(255, 255, 255, 0.03);
            text-align: left;
            padding: 1.25rem 1.5rem;
            color: #94a3b8;
            font-weight: 500;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        td {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            font-size: 0.95rem;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .role-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .role-admin {
            background: rgba(168, 85, 247, 0.2);
            color: #c084fc;
            border: 1px solid rgba(168, 85, 247, 0.3);
        }

        .role-user {
            background: rgba(99, 102, 241, 0.2);
            color: #818cf8;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 0.4rem 0.8rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
        }

        .btn-delete:hover {
            background: var(--danger);
            color: white;
        }

        /* Modal / Form Stylings */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #111827;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2.5rem;
            border-radius: 1.5rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.7);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.75rem;
            color: white;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn-secondary {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.8rem;
            border-radius: 0.75rem;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <div class="sidebar-brand">M-NIDS Admin</div>
        <ul class="nav-menu">
            <li><a href="/admin/overview" class="nav-link">Overview</a></li>
            <li><a href="/admin" class="nav-link">Dashboard</a></li>
            <li><a href="/admin/analytics" class="nav-link">Analytics</a></li>
            <li><a href="/admin/users" class="nav-link active">User Management</a></li>
            <li><a href="/logout" class="nav-link" style="margin-top: auto; color: var(--danger);">Logout</a></li>
        </ul>
    </div>

    <main class="main-content">
        <div class="container">
            <header>
                <h1>User Management</h1>
                <button class="btn-add" onclick="showModal()">+ Add New User</button>
            </header>

            <div class="card">
                <table>
                    <thead>
                        <tr>
                            <th>Username</th>
                            <th>Role</th>
                            <th>Created At</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="user-table-body">
                        <!-- Users will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Add User Modal -->
    <div id="userModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom: 1.5rem;">Add New User</h2>
            <form id="userForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" required placeholder="Enter username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="Enter password">
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="role">
                        <option value="user">Standard User</option>
                        <option value="admin">Administrator</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="hideModal()">Cancel</button>
                    <button type="submit" class="btn-add" style="flex: 2;">Create Account</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        async function fetchUsers() {
            try {
                const response = await fetch('/api/admin/users');
                const users = await response.json();
                const tbody = document.getElementById('user-table-body');
                tbody.innerHTML = '';

                users.forEach(user => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td style="font-weight: 500;">${user.username}</td>
                        <td><span class="role-badge role-${user.role}">${user.role.toUpperCase()}</span></td>
                        <td style="color: #94a3b8;">${new Date(user.created_at).toLocaleDateString()}</td>
                        <td>
                            ${user.username !== 'admin' ?
                            `<button class="btn-delete" onclick="deleteUser(${user.id})">Delete</button>` :
                            '<span style="color: #475569; font-size: 0.8rem;">System Protection</span>'
                        }
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (err) { console.error("Load users failed:", err); }
        }

        function showModal() { document.getElementById('userModal').style.display = 'flex'; }
        function hideModal() { document.getElementById('userModal').style.display = 'none'; }

        document.getElementById('userForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
                role: document.getElementById('role').value
            };

            try {
                const res = await fetch('/api/admin/users/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    hideModal();
                    fetchUsers();
                    document.getElementById('userForm').reset();
                } else {
                    const err = await res.json();
                    alert(err.error || "Failed to add user");
                }
            } catch (err) { alert("Error connecting to server"); }
        };

        async function deleteUser(id) {
            if (!confirm("Are you sure you want to delete this user?")) return;
            try {
                const res = await fetch(`/api/admin/users/delete/${id}`, { method: 'POST' });
                if (res.ok) fetchUsers();
            } catch (err) { alert("Failed to delete user"); }
        }

        window.onload = fetchUsers;
    </script>
</body>

</html>
